name: Keep Streamlit Awake

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Uygulamayi uyanik tut
        run: |
          git config --global user.name "UyanikTutBot"
          git config --global user.email "bot@ornek.com"
          git commit --allow-empty -m "Uygulamayi uyanik tutma operasyonu"
          git push
